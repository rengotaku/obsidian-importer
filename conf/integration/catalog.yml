# Integration test environment catalog - uses test-data/ directory
# Usage: kedro run --env=integration
# Mock mode: ollama.mock=true (no LLM server needed)

# ═══════════════════════════════════════════════════
# Extract Layer - Claude (test fixtures)
# ═══════════════════════════════════════════════════

raw_claude_conversations:
  type: partitions.PartitionedDataset
  path: test-data/01_raw/claude
  dataset:
    type: obsidian_etl.datasets.BinaryDataset
  filename_suffix: ".zip"
  metadata:
    kedro-viz:
      layer: raw

# ═══════════════════════════════════════════════════
# Intermediate Layer
# ═══════════════════════════════════════════════════

parsed_items:
  type: partitions.PartitionedDataset
  path: test-data/02_intermediate/parsed
  dataset:
    type: json.JSONDataset
  filename_suffix: ".json"
  metadata:
    kedro-viz:
      layer: intermediate

