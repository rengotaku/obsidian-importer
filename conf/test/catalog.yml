# Test environment catalog - uses data/test/ directory
# Usage: kedro run --env=test

# ═══════════════════════════════════════════════════
# Extract Layer - Claude (test fixtures)
# ═══════════════════════════════════════════════════

raw_claude_conversations:
  type: partitions.PartitionedDataset
  path: data/test/01_raw/claude
  dataset:
    type: obsidian_etl.datasets.BinaryDataset
  filename_suffix: ".zip"
  metadata:
    kedro-viz:
      layer: raw

# ═══════════════════════════════════════════════════
# Intermediate Layer
# ═══════════════════════════════════════════════════

parsed_items:
  type: partitions.PartitionedDataset
  path: data/test/02_intermediate/parsed
  dataset:
    type: json.JSONDataset
  filename_suffix: ".json"
  metadata:
    kedro-viz:
      layer: intermediate

# ═══════════════════════════════════════════════════
# Primary Layer
# ═══════════════════════════════════════════════════

existing_transformed_items_with_knowledge:
  type: partitions.PartitionedDataset
  path: data/test/03_primary/transformed_knowledge
  dataset:
    type: json.JSONDataset
  filename_suffix: ".json"
  metadata:
    kedro-viz:
      layer: primary

transformed_items_with_knowledge:
  type: partitions.PartitionedDataset
  path: data/test/03_primary/transformed_knowledge
  dataset:
    type: json.JSONDataset
  filename_suffix: ".json"
  metadata:
    kedro-viz:
      layer: primary

transformed_items_with_metadata:
  type: partitions.PartitionedDataset
  path: data/test/03_primary/transformed_metadata
  dataset:
    type: json.JSONDataset
  filename_suffix: ".json"
  metadata:
    kedro-viz:
      layer: primary

# ═══════════════════════════════════════════════════
# Feature Layer (Intermediate Markdown)
# ═══════════════════════════════════════════════════

markdown_notes:
  type: partitions.PartitionedDataset
  path: data/test/04_feature/notes
  dataset:
    type: text.TextDataset
  filename_suffix: ".md"
  metadata:
    kedro-viz:
      layer: feature

# ═══════════════════════════════════════════════════
# Model Input Layer (Classified/Normalized JSON)
# ═══════════════════════════════════════════════════

classified_items:
  type: partitions.PartitionedDataset
  path: data/test/05_model_input/classified
  dataset:
    type: json.JSONDataset
  filename_suffix: ".json"
  overwrite: false
  metadata:
    kedro-viz:
      layer: model_input

existing_classified_items:
  type: partitions.PartitionedDataset
  path: data/test/05_model_input/classified
  dataset:
    type: json.JSONDataset
  filename_suffix: ".json"
  metadata:
    kedro-viz:
      layer: model_input

topic_extracted_items:
  type: partitions.PartitionedDataset
  path: data/test/05_model_input/topic_extracted
  dataset:
    type: json.JSONDataset
  filename_suffix: ".json"
  overwrite: false
  metadata:
    kedro-viz:
      layer: model_input

normalized_items:
  type: partitions.PartitionedDataset
  path: data/test/05_model_input/normalized
  dataset:
    type: json.JSONDataset
  filename_suffix: ".json"
  overwrite: false
  metadata:
    kedro-viz:
      layer: model_input

cleaned_items:
  type: partitions.PartitionedDataset
  path: data/test/05_model_input/cleaned
  dataset:
    type: json.JSONDataset
  filename_suffix: ".json"
  overwrite: false
  metadata:
    kedro-viz:
      layer: model_input

# ═══════════════════════════════════════════════════
# Model Output Layer (Final organized Markdown)
# ═══════════════════════════════════════════════════

organized_notes:
  type: partitions.PartitionedDataset
  path: data/test/07_model_output/organized
  dataset:
    type: text.TextDataset
  filename_suffix: ".md"
  metadata:
    kedro-viz:
      layer: model_output
